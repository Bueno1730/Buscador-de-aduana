<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Principal - Buscador de Aduana</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Menú Principal</h1>
        <p class="text-gray-600 mb-8">¡Hola, <span class="font-bold text-blue-600">{{ user.username }}</span>! ¿Qué deseas hacer hoy?</p>

        <div class="space-y-4">
            
            <a href="{% url 'busqueda' %}" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-300 shadow-sm">
                🔍 Buscar Arancel
            </a>

            {% if not user.is_staff %}
                <a href="{% url 'reportes:reportar' %}" class="block w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded transition duration-300 shadow-sm">
                    ⚠️ Reportar un Error
                </a>
                <a href="{% url 'reportes:mis_reportes' %}" class="block w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-4 rounded transition duration-300 shadow-sm">
                    📂 Ver mis Reportes
                </a>
            {% endif %}

            {% if user.is_staff %}
                <a href="{% url 'reportes:admin_lista' %}" class="block w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded transition duration-300 shadow-sm">
                    📋 Revisar Todos los Reportes
                </a>
                
                <a href="{% url 'agregar_arancel' %}" class="block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded transition duration-300 shadow-sm">
                    ➕ Agregar Nuevo Arancel
                </a>
                <a href="{% url 'auditoria' %}" class="block w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded transition duration-300 shadow-sm">
                    🛡️ Ver Auditoría de Búsquedas
                </a>
            {% endif %}

        </div>

        <div class="mt-8 pt-6 border-t border-gray-200">
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="text-sm text-gray-500 hover:text-gray-800 hover:underline">
                    Cerrar Sesión
                </button>
            </form>
        </div>
        
    </div>

</body>
</html>
