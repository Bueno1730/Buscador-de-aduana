<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud Enviada - ESBO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Solicitud Enviada</h2>
        
        <div class="bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded text-sm text-center mb-6">
            Si el correo proporcionado está registrado, recibirá un enlace para restablecer su contraseña en los próximos minutos.
        </div>
        
        <div class="text-center">
            <a href="{% url 'login' %}" class="inline-block w-full text-center bg-gray-100 text-gray-700 font-bold py-2 px-4 rounded hover:bg-gray-200 transition duration-200">
                Volver al inicio de sesión
            </a>
        </div>
    </div>
</body>
</html>
