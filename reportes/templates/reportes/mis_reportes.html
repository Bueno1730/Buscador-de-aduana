{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <h2>Mis Reportes</h2>
    <table class="table">
        <thead>
            <tr>
                <th>#</th>
                <th>Título</th>
                <th>Estado</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            {% for r in reportes %}
            <tr>
                <td>{{ r.id }}</td>
                <td>{{ r.titulo }}</td>
                <td>{{ r.get_estado_display }}</td>
                <td>{{ r.fecha_creacion|date:"d/m/Y" }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4">No has enviado reportes.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
